version: "3.9"

services:

  app:
    build: .
    container_name: backend_app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY}
      SESSION_SECRET: ${SESSION_SECRET}
      UPLOAD_DIR: /usr/src/app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/usr/src/app/uploads
    restart: always
    stop_grace_period: 5s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: attendance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres_backup:
    image: postgres:16
    container_name: postgres_backup
    depends_on:
      - postgres
    volumes:
      - ./backups:/backups
    environment:
      PGPASSWORD: password
    entrypoint: >
      bash -c "
      apt-get update && apt-get install -y cron &&
      echo '0 2 * * * pg_dump -h postgres -U postgres attendance_db > /backups/postgres_backup.sql' > /etc/cron.d/pgbackup &&
      chmod 0644 /etc/cron.d/pgbackup &&
      crontab /etc/cron.d/pgbackup &&
      cron -f
      "
    restart: always

volumes:
  postgres_data:
    external: true
    name: attendance-management-backend_postgres_data








